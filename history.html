<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>진단 히스토리 · GEO 7-Pillar</title>
  <meta name="description" content="이전 GEO 7-Pillar 브랜드 진단 결과를 확인하세요.">

  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">

  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }

    /* 툴바 */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
    }

    .toolbar__left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toolbar__count {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    /* 히스토리 그리드 */
    #history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    /* 스토리지 배너 */
    .storage-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .storage-banner__text {
      font-size: 0.8125rem;
      color: var(--text-muted);
    }

    .storage-banner__actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    /* 숨겨진 파일 입력 */
    #import-file-input {
      display: none;
    }
  </style>
</head>
<body>

  <!-- 삭제 확인 모달 -->
  <div class="modal-overlay hidden" id="confirm-modal">
    <div class="modal-box">
      <h2 class="modal-box__title" id="confirm-title">확인</h2>
      <p class="modal-box__desc" id="confirm-desc"></p>
      <div class="modal-box__actions">
        <button class="btn btn--secondary" onclick="closeConfirmModal()">취소</button>
        <button class="btn btn--danger" id="confirm-ok-btn">삭제</button>
      </div>
    </div>
  </div>

  <!-- 페이지 헤더 -->
  <header class="page-header">
    <div class="container">
      <a href="index.html" class="page-header__back">← 목록으로</a>
      <h1 class="page-header__title">진단 히스토리</h1>
      <p class="page-header__sub">이전 브랜드 진단 결과를 확인하고 관리하세요</p>
      <span class="page-header__badge">로컬 저장소</span>
    </div>
  </header>

  <!-- 메인 -->
  <main class="page-main" style="flex:1;">
    <div class="container">

      <!-- AI 엔진 배너 -->
      <div class="ai-engine-banner" id="ai-banner">
        <span class="ai-engine-banner__text">
          ℹ️ 이 결과는 Claude (Anthropic) 기반 분석입니다. 다른 브라우저나 기기에서는 공유가 필요합니다.
        </span>
        <button class="ai-engine-banner__close" onclick="dismissBanner()">✕</button>
      </div>

      <!-- 스토리지 배너 -->
      <div class="storage-banner">
        <div>
          <span class="storage-banner__text">💾 결과는 <strong>이 브라우저·이 기기</strong>에만 저장됩니다</span>
          <span style="font-size:0.75rem;color:var(--text-dim);margin-left:8px;">다른 기기에서 보려면 JSON으로 내보내 가져오기 하세요</span>
        </div>
        <div class="storage-banner__actions">
          <button class="btn btn--secondary btn--sm" onclick="exportJSON()" title="결과 데이터를 JSON 파일로 저장합니다">⬇ 백업 (JSON)</button>
          <button class="btn btn--secondary btn--sm" onclick="triggerImport()" title="이전에 내보낸 JSON 파일을 불러옵니다">⬆ 복원 (JSON)</button>
          <input type="file" id="import-file-input" accept=".json" onchange="handleImport(event)">
        </div>
      </div>

      <!-- 툴바 -->
      <div class="toolbar">
        <div class="toolbar__left">
          <span class="toolbar__count" id="result-count">0개 결과</span>
          <select class="form-select" id="sort-select" style="width:140px;padding:6px 36px 6px 10px;" onchange="renderHistory()">
            <option value="newest">최신순</option>
            <option value="grade">등급순</option>
          </select>
        </div>
        <button class="btn btn--secondary btn--sm" onclick="confirmDeleteAll()" style="border-color:var(--red-accent);color:var(--red-accent);" title="저장된 모든 진단 결과를 삭제합니다 (복구 불가)">
          🗑 전체 삭제
        </button>
      </div>

      <!-- 히스토리 그리드 -->
      <div id="history-grid">
        <!-- JS로 렌더링 -->
      </div>

    </div>
  </main>

  <!-- 푸터 -->
  <footer class="site-footer">
    <div class="container">
      <span class="site-footer__brand">AI ROASTING</span>
      <span class="site-footer__copy">Generative Engine Optimization</span>
    </div>
  </footer>

  <script type="module" src="js/history.js"></script>
</body>
</html>
