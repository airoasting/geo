<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>단위 테스트 · GEO 7-Pillar</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    body { padding: 40px; font-family: monospace; }
    .pass { color: #2ecc71; }
    .fail { color: #e74c3c; }
    .section { margin-bottom: 32px; }
    h2 { color: #fff; margin-bottom: 16px; font-size: 1rem; }
    pre { background: #222; padding: 12px; border-radius: 6px; font-size: 0.8125rem; }
  </style>
</head>
<body>
  <h1 style="color:#fff;margin-bottom:32px;">GEO 7-Pillar 단위 테스트</h1>
  <div id="results"></div>

  <script type="module">
    import { calculateGeoTotal, calculateARS, getGrade } from './js/calculator.js';
    import { validateAndFillFallback, parseApiResponse } from './js/fallback.js';
    import { validateKeyFormat } from './js/apikey.js';

    const results = [];

    function test(name, fn) {
      try {
        fn();
        results.push({ name, pass: true });
      } catch (err) {
        results.push({ name, pass: false, error: err.message });
      }
    }

    function assert(condition, message) {
      if (!condition) throw new Error(message || 'Assertion failed');
    }

    function assertEqual(actual, expected, label) {
      if (actual !== expected) {
        throw new Error(`${label}: expected ${expected}, got ${actual}`);
      }
    }

    // ===== Calculator 테스트 =====

    // 테스트용 pillar 데이터
    function makePillars(scores) {
      const keys = ['discoverability', 'source_authority', 'info_depth', 'recency', 'consistency', 'distinctiveness', 'safety'];
      return Object.fromEntries(keys.map((k, i) => [k, { score: scores[i], reason: 'test' }]));
    }

    test('GEO Total: 모든 10점', () => {
      const p = makePillars([10, 10, 10, 10, 10, 10, 10]);
      assertEqual(calculateGeoTotal(p), 10, 'GEO Total');
    });

    test('GEO Total: 소수점 1자리', () => {
      const p = makePillars([9, 9, 8, 9, 8, 7, 8]);
      // 합 = 58, 평균 = 8.285... → 8.3
      assertEqual(calculateGeoTotal(p), 8.3, 'GEO Total rounding');
    });

    test('ARS Hard Veto: P1=3', () => {
      const p = makePillars([3, 8, 8, 8, 8, 8, 8]);
      const result = calculateARS(p);
      assertEqual(result.arsMax, 20, 'Hard Veto arsMax');
      assert(result.ars <= 20, 'ARS should be <= 20');
    });

    test('ARS Hard Veto: P7=2', () => {
      const p = makePillars([8, 8, 8, 8, 8, 8, 2]);
      const result = calculateARS(p);
      assertEqual(result.arsMax, 20, 'Hard Veto P7 arsMax');
      assert(result.ars <= 20, 'ARS should be <= 20');
    });

    test('ARS Soft Veto: P1=5', () => {
      const p = makePillars([5, 8, 8, 8, 8, 8, 8]);
      const result = calculateARS(p);
      assertEqual(result.arsMax, 50, 'Soft Veto arsMax');
      assert(result.ars <= 50, 'ARS should be <= 50');
    });

    test('ARS Soft Veto: P7=4', () => {
      const p = makePillars([8, 8, 8, 8, 8, 8, 4]);
      const result = calculateARS(p);
      assertEqual(result.arsMax, 50, 'Soft Veto P7 arsMax');
    });

    test('ARS 정상: P1=6, P7=6', () => {
      const p = makePillars([6, 8, 8, 8, 8, 8, 6]);
      const result = calculateARS(p);
      assertEqual(result.arsMax, 100, 'Normal arsMax');
    });

    test('ARS 정상: 모든 10점', () => {
      const p = makePillars([10, 10, 10, 10, 10, 10, 10]);
      const result = calculateARS(p);
      assertEqual(result.ars, 100, 'Perfect ARS');
      assertEqual(result.grade, 'S', 'Grade S');
    });

    // 등급 경계값
    test('Grade S: 91점', () => assertEqual(getGrade(91), 'S', 'Grade S'));
    test('Grade A: 90점', () => assertEqual(getGrade(90), 'A', 'Grade A'));
    test('Grade A: 81점', () => assertEqual(getGrade(81), 'A', 'Grade A boundary'));
    test('Grade B: 80점', () => assertEqual(getGrade(80), 'B', 'Grade B'));
    test('Grade B: 71점', () => assertEqual(getGrade(71), 'B', 'Grade B boundary'));
    test('Grade C: 70점', () => assertEqual(getGrade(70), 'C', 'Grade C'));
    test('Grade C: 51점', () => assertEqual(getGrade(51), 'C', 'Grade C boundary'));
    test('Grade D: 50점', () => assertEqual(getGrade(50), 'D', 'Grade D'));
    test('Grade D: 0점', () => assertEqual(getGrade(0), 'D', 'Grade D boundary'));

    // ===== Fallback 테스트 =====

    test('parseApiResponse: 순수 JSON', () => {
      const json = '{"brand":"테스트","pillars":{"discoverability":{"score":8,"reason":"good"}}}';
      const result = parseApiResponse(json);
      assert(result !== null, 'Should parse');
      assertEqual(result.brand, '테스트', 'Brand name');
    });

    test('parseApiResponse: 마크다운 코드 블록', () => {
      const text = '분석 결과입니다:\n```json\n{"brand":"테스트","pillars":{}}\n```';
      const result = parseApiResponse(text);
      assert(result !== null, 'Should parse from markdown');
    });

    test('validateKeyFormat: 유효한 키', () => {
      assert(validateKeyFormat('sk-ant-api03-abcdef12345'), 'Valid key');
    });

    test('validateKeyFormat: 무효한 키', () => {
      assert(!validateKeyFormat('sk-12345'), 'Invalid key format');
      assert(!validateKeyFormat(''), 'Empty key');
      assert(!validateKeyFormat('not-a-key'), 'Wrong prefix');
    });

    // ===== 결과 출력 =====
    const container = document.getElementById('results');
    const passed = results.filter(r => r.pass).length;
    const failed = results.filter(r => !r.pass).length;

    container.innerHTML = `
      <div style="margin-bottom:20px;font-size:1.25rem;">
        <span class="pass">✅ ${passed} 통과</span>
        ${failed > 0 ? `<span class="fail"> · ❌ ${failed} 실패</span>` : ''}
      </div>
      ${results.map(r => `
        <div style="margin-bottom:6px;">
          <span class="${r.pass ? 'pass' : 'fail'}">${r.pass ? '✅' : '❌'}</span>
          <span style="color:${r.pass ? '#ccc' : '#e74c3c'};margin-left:8px;">${r.name}</span>
          ${!r.pass ? `<span style="color:#e74c3c;margin-left:16px;font-size:0.8125rem;">${r.error}</span>` : ''}
        </div>
      `).join('')}
    `;
  </script>
</body>
</html>
